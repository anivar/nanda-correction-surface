name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.6"

      # uv reads .python-version and provisions CPython 3.14.
      # --frozen fails the build if uv.lock is stale, so CI tests exactly what ships.
      - name: Sync environment
        run: uv sync --frozen

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Test
        run: uv run pytest -q

  compat:
    # Parse-check on an OLDER interpreter so 3.14-only syntax (e.g. PEP 758
    # unparenthesised `except`) can never regress unnoticed. compileall only parses,
    # so no dependencies are needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Parse-check (compileall) on Python 3.12
        run: python -m compileall -q nanda_core index client facts agent issuer demo explorer tests schemas
